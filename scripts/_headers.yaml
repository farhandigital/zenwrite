- path: "/*"
  headers:
    Content-Security-Policy:
      default-src: ["'none'"]
      script-src: ["'self'", "https://www.statcounter.com", "{{CSP_SCRIPT_HASHES}}"]
      style-src: ["'self'", "'unsafe-inline'", "https://fonts.googleapis.com"]
      img-src: ["'self'", "https://c.statcounter.com"]
      worker-src: ["blob:"]
      font-src: ["'self'", "https://fonts.gstatic.com"]
      connect-src: ["'self'", "https://c.statcounter.com"]
      base-uri: ["'none'"]
      form-action: ["'self'"]
      frame-ancestors: ["'none'"]
      upgrade-insecure-requests: true

    Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options: DENY
    X-Content-Type-Options: nosniff
    Referrer-Policy: no-referrer

    Permissions-Policy:
      # Hardware and Sensors (Privacy/Security Risk)
      camera: []
      microphone: []
      geolocation: []
      usb: []
      bluetooth: []
      hid: []
      serial: []
      magnetometer: []
      accelerometer: []
      gyroscope: []

      # Payment and Credentials
      payment: []
      publickey-credentials-get: []

      # Annoyances
      autoplay: []

      # Features we DO want
      fullscreen: ["self"]

      # Performance limits
      sync-xhr: []
      display-capture: []
      xr-spatial-tracking: []

    # null value → Cloudflare Pages deletion directive (emits the key name only)
    "! Access-Control-Allow-Origin": ~
    Cross-Origin-Opener-Policy: same-origin
    Cross-Origin-Embedder-Policy: credentialless
    Cross-Origin-Resource-Policy: same-origin